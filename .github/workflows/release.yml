name: Release

# v* 태그 push 시 자동 빌드 & GitHub Release 업로드
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: git이 Xcode Command Line Tools에 포함되어 있어 별도 설치 불필요
      # Windows: git은 runner에 기본 포함
      - name: Build & Publish Release
        run: npm run release
        env:
          # GitHub Releases 업로드 토큰
          # repo Settings → Secrets → GH_TOKEN 에 GitHub Personal Access Token 등록 필요
          # 필요 권한: contents:write (repo 스코프)
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # ── macOS 코드 사이닝 (선택 사항) ───────────────────────
          # Apple Developer 인증서가 있을 경우 아래 시크릿을 설정하면
          # 코드 사이닝 + 공증(notarization)이 자동으로 처리됩니다.
          # CSC_LINK: ${{ secrets.CSC_LINK }}               # base64 인코딩된 .p12
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # ── Windows 코드 사이닝 (선택 사항) ─────────────────────
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

          # 코드 사이닝 인증서 없이 빌드할 경우 (개발/테스트용)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts (debug)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: release-logs-${{ matrix.platform }}
          path: release/
