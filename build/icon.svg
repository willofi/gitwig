<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>

  <!-- Subtle ambient glow behind twig -->
  <ellipse cx="430" cy="490" rx="280" ry="340" fill="#58a6ff" opacity="0.04"/>

  <!-- ═══════════════ TWIG STRUCTURE ═══════════════ -->
  <!-- Trunk: x=340, y=830 → y=155 (bottom to top) -->

  <!-- Trunk line -->
  <line x1="340" y1="830" x2="340" y2="155"
    stroke="#3d6fa8" stroke-width="30" stroke-linecap="round"/>
  <line x1="340" y1="830" x2="340" y2="155"
    stroke="#58a6ff" stroke-width="18" stroke-linecap="round" opacity="0.9" filter="url(#glow1)"/>

  <!-- Branch 1 — top right (long) -->
  <!-- junction at (340, 275) → tip at (730, 160) -->
  <line x1="340" y1="275" x2="730" y2="160"
    stroke="#2a6b38" stroke-width="26" stroke-linecap="round"/>
  <line x1="340" y1="275" x2="730" y2="160"
    stroke="#3fb950" stroke-width="16" stroke-linecap="round" opacity="0.9" filter="url(#glow1)"/>

  <!-- Branch 2 — mid right (medium) -->
  <!-- junction at (340, 455) → tip at (690, 345) -->
  <line x1="340" y1="455" x2="690" y2="345"
    stroke="#5a3d8a" stroke-width="24" stroke-linecap="round"/>
  <line x1="340" y1="455" x2="690" y2="345"
    stroke="#d2a8ff" stroke-width="14" stroke-linecap="round" opacity="0.9" filter="url(#glow1)"/>

  <!-- Branch 3 — lower right (shorter) -->
  <!-- junction at (340, 620) → tip at (600, 535) -->
  <line x1="340" y1="620" x2="600" y2="535"
    stroke="#7a4a1a" stroke-width="22" stroke-linecap="round"/>
  <line x1="340" y1="620" x2="600" y2="535"
    stroke="#ffa657" stroke-width="13" stroke-linecap="round" opacity="0.9" filter="url(#glow1)"/>

  <!-- ═══════════════ NODES (commit dots) ═══════════════ -->

  <!-- Trunk bottom (base) -->
  <circle cx="340" cy="830" r="22" fill="#1a3a5c" filter="url(#shadow)"/>
  <circle cx="340" cy="830" r="22" fill="#58a6ff" opacity="0.35"/>

  <!-- Branch 3 junction -->
  <circle cx="340" cy="620" r="26" fill="#1a3a5c"/>
  <circle cx="340" cy="620" r="26" fill="#58a6ff" opacity="0.3"/>
  <circle cx="340" cy="620" r="13" fill="#58a6ff" opacity="0.9"/>

  <!-- Branch 3 tip -->
  <circle cx="600" cy="535" r="32" fill="#4a2a0a" filter="url(#shadow)"/>
  <circle cx="600" cy="535" r="32" fill="#ffa657" opacity="0.25" filter="url(#glow2)"/>
  <circle cx="600" cy="535" r="18" fill="#ffa657" filter="url(#glow1)"/>
  <circle cx="600" cy="535" r="8" fill="#fff8f0"/>

  <!-- Branch 2 junction -->
  <circle cx="340" cy="455" r="30" fill="#1a3a5c"/>
  <circle cx="340" cy="455" r="30" fill="#58a6ff" opacity="0.25"/>
  <circle cx="340" cy="455" r="15" fill="#58a6ff" opacity="0.9"/>

  <!-- Branch 2 tip -->
  <circle cx="690" cy="345" r="36" fill="#2a1a5c" filter="url(#shadow)"/>
  <circle cx="690" cy="345" r="36" fill="#d2a8ff" opacity="0.22" filter="url(#glow2)"/>
  <circle cx="690" cy="345" r="20" fill="#d2a8ff" filter="url(#glow1)"/>
  <circle cx="690" cy="345" r="9" fill="#f8f0ff"/>

  <!-- Branch 1 junction -->
  <circle cx="340" cy="275" r="32" fill="#1a3a5c"/>
  <circle cx="340" cy="275" r="32" fill="#58a6ff" opacity="0.2"/>
  <circle cx="340" cy="275" r="16" fill="#58a6ff"/>

  <!-- Branch 1 tip -->
  <circle cx="730" cy="160" r="40" fill="#0d2a1a" filter="url(#shadow)"/>
  <circle cx="730" cy="160" r="40" fill="#3fb950" opacity="0.25" filter="url(#glow2)"/>
  <circle cx="730" cy="160" r="23" fill="#3fb950" filter="url(#glow1)"/>
  <circle cx="730" cy="160" r="10" fill="#f0fff4"/>

  <!-- Trunk top (HEAD) -->
  <circle cx="340" cy="155" r="44" fill="#0a1a3a" filter="url(#shadow)"/>
  <circle cx="340" cy="155" r="44" fill="#58a6ff" opacity="0.2" filter="url(#glow2)"/>
  <circle cx="340" cy="155" r="26" fill="#58a6ff" filter="url(#glow1)"/>
  <circle cx="340" cy="155" r="12" fill="#e8f4ff"/>
</svg>
