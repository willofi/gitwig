<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="150" y1="80" x2="900" y2="930" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#173229"/>
      <stop offset="55%" stop-color="#10231f"/>
      <stop offset="100%" stop-color="#091412"/>
    </linearGradient>
    <radialGradient id="mist" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(624 286) rotate(98.4) scale(520 430)">
      <stop offset="0%" stop-color="#86efac" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#58a6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bark" x1="330" y1="830" x2="520" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5c341c"/>
      <stop offset="45%" stop-color="#7b4b2d"/>
      <stop offset="100%" stop-color="#a16a42"/>
    </linearGradient>
    <linearGradient id="barkHi" x1="352" y1="830" x2="530" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c58b57" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#f1c590" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#fff1cf" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="leafMain" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d9f99d"/>
      <stop offset="45%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#1faa59"/>
    </linearGradient>
    <linearGradient id="leafDeep" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#0f8a46"/>
    </linearGradient>
    <linearGradient id="budBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b6e3ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#020706" flood-opacity="0.45"/>
    </filter>
    <path id="leaf" d="M3 31C8 12 24 2 42 3C53 4 65 12 71 23C63 42 46 55 26 58C15 55 7 45 3 31Z"/>
  </defs>

  <g transform="translate(512 512) scale(0.82) translate(-512 -512)">
    <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>
    <rect width="1024" height="1024" rx="210" fill="url(#mist)"/>

  <ellipse cx="470" cy="560" rx="314" ry="356" fill="#58a6ff" opacity="0.05"/>

    <!-- Branch skeleton -->
    <g filter="url(#shadow)">
      <path d="M358 842C349 746 346 650 355 563C366 454 390 357 442 173" stroke="url(#bark)" stroke-width="44" stroke-linecap="round"/>
      <path d="M393 618C476 623 562 593 648 520" stroke="url(#bark)" stroke-width="30" stroke-linecap="round"/>
      <path d="M403 452C505 431 610 390 726 314" stroke="url(#bark)" stroke-width="32" stroke-linecap="round"/>
      <path d="M426 286C538 244 653 190 780 118" stroke="url(#bark)" stroke-width="34" stroke-linecap="round"/>

      <path d="M358 842C349 746 346 650 355 563C366 454 390 357 442 173" stroke="url(#barkHi)" stroke-width="18" stroke-linecap="round" opacity="0.92"/>
      <path d="M393 618C476 623 562 593 648 520" stroke="url(#barkHi)" stroke-width="12" stroke-linecap="round" opacity="0.82"/>
      <path d="M403 452C505 431 610 390 726 314" stroke="url(#barkHi)" stroke-width="13" stroke-linecap="round" opacity="0.84"/>
      <path d="M426 286C538 244 653 190 780 118" stroke="url(#barkHi)" stroke-width="14" stroke-linecap="round" opacity="0.88"/>
    </g>

    <!-- Leaves -->
    <g filter="url(#softGlow)">
      <use href="#leaf" transform="translate(698 88) rotate(-12)" fill="url(#leafMain)"/>
      <use href="#leaf" transform="translate(736 118) rotate(18)" fill="url(#leafDeep)"/>
      <use href="#leaf" transform="translate(756 76) rotate(-34) scale(0.94)" fill="url(#leafMain)"/>
      <use href="#leaf" transform="translate(648 282) rotate(-8) scale(0.92)" fill="url(#leafMain)"/>
      <use href="#leaf" transform="translate(684 315) rotate(18) scale(0.86)" fill="url(#leafDeep)"/>
      <use href="#leaf" transform="translate(602 498) rotate(14) scale(0.84)" fill="url(#leafMain)"/>
      <use href="#leaf" transform="translate(632 532) rotate(34) scale(0.76)" fill="url(#leafDeep)"/>
      <use href="#leaf" transform="translate(452 126) rotate(-40) scale(0.78)" fill="url(#leafMain)"/>
      <use href="#leaf" transform="translate(428 224) rotate(-18) scale(0.72)" fill="url(#leafDeep)"/>
    </g>

    <!-- Bud / commit nodes -->
    <g filter="url(#shadow)">
      <circle cx="358" cy="842" r="24" fill="#21464c"/>
      <circle cx="358" cy="842" r="14" fill="url(#budBlue)"/>
      <circle cx="358" cy="842" r="6" fill="#eefaff"/>

      <circle cx="391" cy="618" r="22" fill="#21464c"/>
      <circle cx="391" cy="618" r="12" fill="url(#budBlue)"/>
      <circle cx="391" cy="618" r="5" fill="#eefaff"/>

      <circle cx="401" cy="452" r="23" fill="#21464c"/>
      <circle cx="401" cy="452" r="13" fill="url(#budBlue)"/>
      <circle cx="401" cy="452" r="5" fill="#eefaff"/>

      <circle cx="424" cy="286" r="24" fill="#21464c"/>
      <circle cx="424" cy="286" r="13" fill="url(#budBlue)"/>
      <circle cx="424" cy="286" r="5.5" fill="#eefaff"/>

      <circle cx="442" cy="173" r="34" fill="#173740"/>
      <circle cx="442" cy="173" r="21" fill="url(#budBlue)"/>
      <circle cx="442" cy="173" r="8" fill="#f3fbff"/>
    </g>

    <!-- Leaf tip fruits -->
    <g filter="url(#softGlow)">
      <circle cx="794" cy="114" r="22" fill="#8bf39f" opacity="0.25"/>
      <circle cx="794" cy="114" r="11" fill="#d9f99d"/>
      <circle cx="736" cy="312" r="18" fill="#7dd3fc" opacity="0.24"/>
      <circle cx="736" cy="312" r="9" fill="#93c5fd"/>
      <circle cx="652" cy="520" r="16" fill="#fdba74" opacity="0.2"/>
      <circle cx="652" cy="520" r="8" fill="#f59e0b"/>
    </g>
  </g>
</svg>
